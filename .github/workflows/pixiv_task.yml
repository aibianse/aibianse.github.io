name: Pixiv Crawler
on:
  workflow_dispatch:
  schedule:
    # 代表国际标准时间21点30分，北京时间需要+8小时，代表北京时间上午5点30分点运行
    - cron: '30 21 * * *'
env:
  ACTIONS_ALLOW_UNSECURE_COMMANDS: true

jobs:
  #将工作流程中运行的所有作业组合在一起
  build:
    #定义名为 build 的作业，子键将定义作业的属性
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
          with:
            ref: main # 改成存放图片的分支
      - name: Clear Previous
          run: |
            rm -f -- *.jpg
            rm -f -- *.png

      - name: Set up Python 3.9
          uses: actions/setup-python@v2
          with:
            python-version: 3.9.15
      - name: Set timezone
        run: |
          cp /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
      - name: Install pip packages
        run: |
          python -m pip install --upgrade pip
          pip3 install -r requirements.txt
      - name: Pixiv Crawler
        run: |
          python3 python_pixiv.py
      - name: list
        run: ls
      - name: Upload to this repo
        run: |
          git config --global user.name "aibianse" # 改成Github账号用户名
          git config --global user.email "aibianse@outlook.com" # 改成GitHub账号的邮箱
          git add "*.jpg" "*.png" && echo "Git Added" # 参考: https://stackoverflow.com/questions/25083290/git-add-error-unknown-switch
          git commit -m 'upload pa result' && echo "Git Committed"
          git push -u origin main && echo "Git Pushed Origin" # 改成存放图片的分支
      - name: Failure test
        if: failure()
          run: |
            ls
            echo "Error on running!"
